id = "repo_indexer"
role = "repo_indexer"
trust_domain = "same_owner_local"
capabilities = ["repo.index"]
exposed_capabilities = ["repo.index"]
default_data_boundaries = ["owner_local"]

[owner]
kind = "human"
id = "local-dev"
display_name = "Local Developer"

[[adapters]]
adapter = "mcp"
capability = "filesystem.read"
default_scope = ["repo:read"]

