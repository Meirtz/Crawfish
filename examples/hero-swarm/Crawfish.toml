[storage]
sqlite_path = ".crawfish/state/control.db"
state_dir = ".crawfish/state"

[swarm]
manifests_dir = "agents"

[api]
socket_path = ".crawfish/run/crawfishd.sock"

# Hero P0 currently supports MCP over SSE only.
[mcp.servers.hero_remote]
transport = "sse"
url = "http://127.0.0.1:8877/sse"
connect_timeout_ms = 5000
request_timeout_ms = 15000

[openclaw.inbound]
enabled = true
caller_owner_mapping = "required"
default_trust_domain = "same_device_foreign_owner"

[openclaw.inbound.allowed_callers.local_gateway]
owner_kind = "human"
owner_id = "local-dev"
display_name = "Local Gateway"
allowed_scopes = ["crawfish.read", "crawfish.submit"]

[openclaw.inbound.allowed_callers.foreign_gateway]
owner_kind = "human"
owner_id = "foreign-owner"
display_name = "Foreign Gateway"
allowed_scopes = ["crawfish.read", "crawfish.submit"]

[treaties.packs.remote_task_planning]
id = "remote_task_planning"
title = "Remote task planning treaty"
summary = "Allow proposal-only remote task planning across a governed remote agent boundary."
allowed_capabilities = ["task.plan"]
allowed_data_scopes = ["objective", "workspace_root", "context_files", "constraints", "desired_outputs", "background", "verification_feedback", "base_ref", "head_ref"]
allowed_artifact_classes = ["task_plan.json", "task_plan.md"]
allowed_auth_forwarding_mode = "none"
required_checkpoints = ["admission", "pre_dispatch", "post_result"]
required_result_evidence = ["delegation_receipt_present", "remote_task_ref_present", "terminal_state_verified", "artifact_classes_allowed", "data_scopes_allowed"]
max_delegation_depth = 1
review_policy = "evaluation_profile"
on_scope_violation = "deny"
on_evidence_gap = "review_required"
review_queue = true
alert_rules = ["frontier_gap_detected"]

[treaties.packs.remote_task_planning.local_owner]
kind = "human"
id = "local-dev"
display_name = "Local Developer"

[treaties.packs.remote_task_planning.remote_principal]
kind = "agent"
id = "remote-task-planner"
display_name = "Remote Task Planner"
agent_card_url = "http://127.0.0.1:7788/agent-card.json"
trust_domain = "public_unknown"

[[treaties.packs.remote_task_planning.clauses]]
id = "proposal_only_remote_task_plan"
title = "Proposal-only remote planning"
summary = "Remote delegation may only return proposal artifacts and must satisfy treaty checkpoints."
required_checkpoints = ["admission", "pre_dispatch", "post_result"]

[federation.packs.remote_task_plan_default]
id = "remote_task_plan_default"
title = "Remote task.plan federation pack"
summary = "Interpret remote task.plan states and results consistently across the agent frontier."
treaty_pack_id = "remote_task_planning"
required_remote_evidence = ["delegation_receipt_present", "remote_task_ref_present", "terminal_state_verified", "artifact_classes_allowed", "data_scopes_allowed"]
result_acceptance_policy = "accepted"
scope_violation_policy = "rejected"
evidence_gap_policy = "review_required"
blocked_remote_policy = "blocked"
auth_required_policy = "awaiting_approval"
remote_failure_policy = "failed"
required_checkpoints = ["admission", "pre_dispatch", "post_result"]
max_delegation_depth = 1

[federation.packs.remote_task_plan_default.review_defaults]
enabled = true
priority = "high"

[federation.packs.remote_task_plan_default.alert_defaults]
rules = ["frontier_gap_detected"]

[runtime]
reconcile_interval_ms = 5000

[evaluation]
# Built-in profiles auto-resolve for:
# - task.plan -> task_plan_default
# - repo.review -> repo_review_default
# - incident.enrich -> incident_enrich_default
# Override them under [evaluation.profiles.*], [evaluation.scorecards.*],
# [evaluation.datasets.*], and [evaluation.alerts.*] as the swarm matures.

[governance.system_defaults]
default_disposition = "allow_with_lease"
capability_visibility = "owner_only"
data_boundary = "owner_only"
tool_boundary = "no_cross_owner_mutation"
workspace_boundary = "isolated"
network_boundary = "local_only"

[contracts.org_defaults.delivery]
deadline_ms = 300000
freshness_ttl_ms = 60000
required_ack = true
liveliness_window_ms = 30000

[contracts.org_defaults.execution]
max_cost_usd = 5.0
max_tokens = 64000
model_class = "standard"
preferred_harnesses = ["mcp"]
fallback_chain = ["deterministic"]
retry_budget = 1

[contracts.org_defaults.safety]
tool_scope = ["repo:read", "ci:read", "logs:read"]
approval_policy = "on_mutation"
mutation_mode = "proposal_only"
data_zone = "owner_local"
secret_policy = "adapter_scoped"

[contracts.org_defaults.quality]
quality_class = "standard"
minimum_confidence = 0.6

[contracts.org_defaults.recovery]
resumability = "checkpoint_resume"
fallback_behavior = "degrade"
# Prefer deterministic continuity first, then queueing, then operator handoff.
continuity_preference = ["deterministic_only", "store_and_forward", "human_handoff"]
deterministic_fallbacks = ["local.rule_engine"]
